<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đặt phòng họp</title>
    <meta name="description" content="Dashboard đặt phòng họp cho nội bộ công ty." />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./app.js"></script>
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <div>
          <p class="eyebrow">Hệ thống nội bộ</p>
          <h1>Đặt phòng họp</h1>
          <p class="page-subtitle">
            Mở từng dashboard để xem tuần hiện tại, tuần tới và đặt lịch trực tiếp trên ngày còn trống.
          </p>
        </div>

        <div class="legend" aria-label="Chú thích màu">
          <span class="legend-item legend-blue">Có buổi họp</span>
          <span class="legend-item legend-red">Full chỗ</span>
          <span class="legend-item legend-yellow">Ngày đang chọn</span>
        </div>
      </header>

      <section id="dashboard-root" class="dashboard-stack" aria-live="polite"></section>
    </main>
  </body>
</html>
